# ================================================================
#  nginx/folio.conf
#  Nginx reverse proxy config for Folio Bookstore
#
#  Setup:
#    sudo cp nginx/folio.conf /etc/nginx/sites-available/folio
#    sudo ln -s /etc/nginx/sites-available/folio /etc/nginx/sites-enabled/
#    sudo nginx -t && sudo systemctl reload nginx
# ================================================================

upstream folio_app {
    server 127.0.0.1:3000;
    keepalive 64;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    return 301 https://$host$request_uri;
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # ── SSL (replace with your cert paths) ───────────────────────
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security headers ──────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"              always;
    add_header X-XSS-Protection       "1; mode=block"           always;
    add_header X-Content-Type-Options "nosniff"                 always;
    add_header Referrer-Policy        "no-referrer-when-downgrade" always;

    # ── Gzip ─────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types      text/plain text/css text/xml application/json
                    application/javascript application/xml+rss
                    application/atom+xml image/svg+xml;

    # ── Static assets (served by Nginx directly) ─────────────────
    location ~* \.(html|css|js|ico|png|jpg|jpeg|gif|svg|woff|woff2|ttf)$ {
        root /var/www/folio/frontend;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri @node;
    }

    # ── API proxy → Node.js ───────────────────────────────────────
    location /api/ {
        proxy_pass         http://folio_app;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade          $http_upgrade;
        proxy_set_header   Connection       "upgrade";
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        client_max_body_size 2M;
    }

    # ── Health check ─────────────────────────────────────────────
    location /health {
        proxy_pass http://folio_app/health;
    }

    # ── SPA fallback: all other routes → Node.js ─────────────────
    location @node {
        proxy_pass http://folio_app;
        proxy_http_version 1.1;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
        try_files $uri $uri/ @node;
    }
}